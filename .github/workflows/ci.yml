name: CI

on:
  pull_request:
    paths:
      - "apps/**"
      - "packages/**"
      - "docker/**"
      - ".github/workflows/**"
      - "turbo.json"
      - "package.json"
      - "bun.lock"

  push:
    branches:
      - main
    paths:
      - "apps/**"
      - "packages/**"
      - "docker/**"
      - ".github/workflows/**"
      - "turbo.json"
      - "package.json"
      - "bun.lock"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint / Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            .turbo
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - name: Install Dependencies
        run: bun install

      - name: Run Lint
        run: bun run lint

      - name: Run Build
        run: bun run build

  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    needs: quality

    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      executor: ${{ steps.filter.outputs.executor }}
      ai_builder: ${{ steps.filter.outputs.ai_builder }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Changed Files
        id: filter
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          else
            CHANGED_FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }})
          fi

          echo "$CHANGED_FILES"

          echo "backend=false" >> $GITHUB_OUTPUT
          echo "frontend=false" >> $GITHUB_OUTPUT
          echo "executor=false" >> $GITHUB_OUTPUT
          echo "ai_builder=false" >> $GITHUB_OUTPUT

          if echo "$CHANGED_FILES" | grep -q '^apps/backend/'; then
            echo "backend=true" >> $GITHUB_OUTPUT
          fi

          if echo "$CHANGED_FILES" | grep -q '^apps/frontend/'; then
            echo "frontend=true" >> $GITHUB_OUTPUT
          fi

          if echo "$CHANGED_FILES" | grep -q '^apps/executor/'; then
            echo "executor=true" >> $GITHUB_OUTPUT
          fi

          if echo "$CHANGED_FILES" | grep -q '^apps/ai-builder/'; then
            echo "ai_builder=true" >> $GITHUB_OUTPUT
          fi

          if echo "$CHANGED_FILES" | grep -q '^docker/Dockerfile\.backend$'; then
            echo "backend=true" >> $GITHUB_OUTPUT
          fi

          if echo "$CHANGED_FILES" | grep -q '^docker/Dockerfile\.frontend$'; then
            echo "frontend=true" >> $GITHUB_OUTPUT
          fi

          if echo "$CHANGED_FILES" | grep -q '^docker/Dockerfile\.executor$'; then
            echo "executor=true" >> $GITHUB_OUTPUT
          fi

          if echo "$CHANGED_FILES" | grep -q '^docker/Dockerfile\.ai-builder$'; then
            echo "ai_builder=true" >> $GITHUB_OUTPUT
          fi

          # ── packages/ — map each package to services that consume it ──
          if echo "$CHANGED_FILES" | grep -q '^packages/db/'; then
            echo "backend=true" >> $GITHUB_OUTPUT
            echo "executor=true" >> $GITHUB_OUTPUT
            echo "ai_builder=true" >> $GITHUB_OUTPUT
          fi
          if echo "$CHANGED_FILES" | grep -q '^packages/executor-utils/'; then
            echo "backend=true" >> $GITHUB_OUTPUT
            echo "executor=true" >> $GITHUB_OUTPUT
          fi
          if echo "$CHANGED_FILES" | grep -q '^packages/types/'; then
            echo "backend=true" >> $GITHUB_OUTPUT
            echo "frontend=true" >> $GITHUB_OUTPUT
            echo "executor=true" >> $GITHUB_OUTPUT
            echo "ai_builder=true" >> $GITHUB_OUTPUT
          fi
          if echo "$CHANGED_FILES" | grep -q '^packages/redis/'; then
            echo "backend=true" >> $GITHUB_OUTPUT
            echo "executor=true" >> $GITHUB_OUTPUT
          fi
          if echo "$CHANGED_FILES" | grep -q '^packages/plan-guards/'; then
            echo "backend=true" >> $GITHUB_OUTPUT
            echo "ai_builder=true" >> $GITHUB_OUTPUT
          fi
          if echo "$CHANGED_FILES" | grep -q '^packages/node-registry/'; then
            echo "executor=true" >> $GITHUB_OUTPUT
            echo "ai_builder=true" >> $GITHUB_OUTPUT
            echo "frontend=true" >> $GITHUB_OUTPUT
          fi
          if echo "$CHANGED_FILES" | grep -q '^packages/market/'; then
            echo "executor=true" >> $GITHUB_OUTPUT
          fi
          if echo "$CHANGED_FILES" | grep -q '^packages/lighter-sdk-ts/'; then
            echo "executor=true" >> $GITHUB_OUTPUT
          fi
          # packages/ui, packages/eslint-config, packages/typescript-config
          # are not consumed by any service — changes there intentionally skipped

      - name: Save Changed Services
        run: |
          mkdir -p changed

          echo '${{ steps.filter.outputs.backend }}' > changed/backend
          echo '${{ steps.filter.outputs.frontend }}' > changed/frontend
          echo '${{ steps.filter.outputs.executor }}' > changed/executor
          echo '${{ steps.filter.outputs.ai_builder }}' > changed/ai_builder

      - name: Upload Changed Services
        uses: actions/upload-artifact@v4
        with:
          name: changed-services
          path: changed/

  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest

    needs:
      - quality
      - detect-changes

    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'

    strategy:
      fail-fast: false

      matrix:
        include:
          - service: backend
            dockerfile: docker/Dockerfile.backend
            image: quantnest-backend
            changed: ${{ needs.detect-changes.outputs.backend }}

          - service: frontend
            dockerfile: docker/Dockerfile.frontend
            image: quantnest-frontend
            changed: ${{ needs.detect-changes.outputs.frontend }}

          - service: executor
            dockerfile: docker/Dockerfile.executor
            image: quantnest-executor
            changed: ${{ needs.detect-changes.outputs.executor }}

          - service: ai-builder
            dockerfile: docker/Dockerfile.ai-builder
            image: quantnest-ai-builder
            changed: ${{ needs.detect-changes.outputs.ai_builder }}

    steps:
      - name: Checkout
        if: matrix.changed == 'true'
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        if: matrix.changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: matrix.changed == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        if: matrix.changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true

          build-args: |
            ${{ matrix.service == 'frontend' && format('VITE_BACKEND_URL={0}', secrets.BACKEND_URL) || '' }}

          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:v${{ github.sha }}

          cache-from: type=gha
          cache-to: type=gha,mode=max

  version:
    name: Upload Version Artifact
    runs-on: ubuntu-latest
    needs: docker-build
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'

    steps:
      - name: Save Version
        run: |
          mkdir -p version
          echo "v${{ github.sha }}" > version/version.txt

      - name: Upload Version
        uses: actions/upload-artifact@v4
        with:
          name: version
          path: version/
