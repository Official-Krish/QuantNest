apiVersion: apps/v1
kind: Deployment
metadata:
  name: quantnest-frontend
  namespace: quantnest
  labels:
    app: quantnest-frontend
spec:
  replicas: 1

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  selector:
    matchLabels:
      app: quantnest-frontend
  template:
    metadata:
      labels:
        app: quantnest-frontend
    spec:
      containers:
        - name: quantnest-frontend
          image: krishanand01/quantnest-frontend:v1.2.6
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "5m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15

          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10

          volumeMounts:
            - name: env-file
              mountPath: /app/apps/frontend/.env
              subPath: env

      volumes:
        - name: env-file
          secret:
            secretName: quantnest-frontend-env

